  <text x="62" y="452" fill="#075985" font-family="Arial, sans-serif" font-size="15" font-weight="700">我会先读取你的长期记忆</text>
  <text x="62" y="481" fill="#0c4a6e" font-family="Arial, sans-serif" font-size="13">危险本地动作会单独确认。</text>
