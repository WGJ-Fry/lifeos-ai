<svg xmlns="http://www.w3.org/2000/svg" width="390" height="844" viewBox="0 0 390 844" role="img" aria-labelledby="title desc">
  <title id="title">LifeOS 手机端 AI 聊天</title>
  <desc id="desc">LifeOS AI 手机端聊天入口安装预览图</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#0f172a"/>
      <stop offset="1" stop-color="#111827"/>
