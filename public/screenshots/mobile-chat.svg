  <text x="62" y="225" fill="#0f172a" font-family="Arial, sans-serif" font-size="16" font-weight="700">今天先帮你整理什么？</text>
  <text x="62" y="252" fill="#475569" font-family="Arial, sans-serif" font-size="13">聊天、记忆和本地能力都在这里。</text>
