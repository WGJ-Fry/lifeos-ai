  <text x="104" y="185" fill="#14532d" font-family="Arial, sans-serif" font-size="17" font-weight="700">电脑端在线</text>
  <text x="104" y="214" fill="#166534" font-family="Arial, sans-serif" font-size="13">公网隧道已启用，连接受保护。</text>
