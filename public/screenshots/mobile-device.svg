      <stop offset="0" stop-color="#0b1120"/>
      <stop offset="0.5" stop-color="#172554"/>
      <stop offset="1" stop-color="#0f172a"/>
    </linearGradient>
  </defs>
  <rect width="390" height="844" fill="url(#bg)"/>
  <rect x="22" y="24" width="346" height="796" rx="36" fill="#f8fafc"/>
